<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/color-modes.js"></script>
    <link href="../assets/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"/>

    <title>Transporte Público</title>
</head>
<body>
  <header class="p-4">
        <div class="container">
          <div
            class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start"
          >
            <a
              href="/"
              class="d-flex align-items-center mb-2 mb-lg-0 link-body-emphasis text-decoration-none"
            >
              <svg
                class="bi me-2"
                width="40"
                height="32"
                role="img"
                aria-label="Bootstrap"
              >
                <use xlink:href="#bootstrap"></use>
              </svg>
            </a>
            <ul
              class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0"
            >
              <li><a href="/JahuAqui-main/JahuAqui-main/src/frontend/paginaNoticias/index.html" class="nav-link px-2 text-white">Notícias</a></li>
              <li><a href="#" class="nav-link px-2 text-white">Lazer</a></li>
              <li><a href="#" class="nav-link px-2 text-secondary">Transporte Público</a></li>
              <li><a href="#" class="nav-link px-2 text-white">Comércios</a></li>
            </ul>
            <form class="col-12 col-lg-auto mb-3 mb-lg-0 me-lg-3" role="search">
              <input
                type="search"
                class="form-control"
                placeholder="Pesquisar..."
                aria-label="Pesquisar"
              />
            </form>
            <div class="dropdown text-end">

                <a
                    href="#"
                    class="d-block text-white text-decoration-none dropdown-toggle user-link"
                    data-bs-toggle="dropdown"
                >
                <img
                  src="https://github.com/mdo.png"
                  alt="mdo"
                  width="32"
                  height="32"
                  class="rounded-circle"
                />
              </a>
              <ul class="dropdown-menu text-small">
                <li><a class="dropdown-item" href="#">Prestar Serviços</a></li>
                <li><a class="dropdown-item" href="#">Editar</a></li>
                <li><hr class="dropdown-divider" /></li>
                <li><a class="dropdown-item" href="#">Sair</a></li>
              </ul>
            </div>
          </div>
        </div>
  </header>

  <div class="search-box container my-4">
  <h5 class="mb-3">Escolha a linha que deseja consultar</h5>

  <div class="row g-3 align-items-center">
    <div class="col-md-3">
      <select class="form-select">
        <option>Escolha o Tipo</option>
        <option>URBANA</option>
      </select>
    </div>

    <div class="col-md-3">
      <select class="form-select" id="linhaSelect">
        <option value="">Escolha a Linha</option>
        <option value="america">AMÉRICA (VIA HOSP. A. CARVALHO)</option>
        <option value="bela-vista">BELA VISTA</option>
        <option value="cemiterio">CEMITÉRIO (VIA HOSP. SÃO JUDAS)</option>
        <option value="cond-itauna">CONDOMÍNIO ITAUNA</option>
        <option value="cond-primavera">CONDOMÍNIO PRIMAVERA</option>
        <option value="jau-shopping">JAÚ SHOPPING</option>
        <option value="jd-ipes">JD DOS IPÊS</option>
        <option value="joao-balan">JOÃO BALAN I-II</option>
        <option value="jorge-atalla">JORGE ATALLA</option>
        <option value="maria-cibele">MARIA CIBELE (VIA JD.CAROLINA/SANTA CASA)</option>
        <option value="maria-luiza">MARIA LUIZA IV (PAS SÃO BENEDITO)</option>
        <option value="novo-horizonte">NOVO HORIZONTE (VIA MARIA IZABEL/SANTA ROSA)</option>
        <option value="olimpia">OLÍMPIA</option>
        <option value="orlando-ometto">ORLANDO OMETTO (VIA PEDRO OMETTO)</option>
        <option value="paraty">PARATY</option>
        <option value="pe-augusto-sani">PE. AUGUSTO SANI (VIA NOVA JAÚ)</option>
        <option value="pedro-ometto">PEDRO OMETTO (VIA JD.BRASÍLIA)</option>
        <option value="res-frei-galvao">RES. FREI GALVÃO (VIA FUNDAÇÃO) / TERMINAL</option>
        <option value="rodrigues-branco">RODRIGUES BRANCO (VIA FUNDAÇÃO)</option>
        <option value="santa-casa">SANTA CASA</option>
        <option value="santa-helena">SANTA HELENA (VIA HOSP. SÃO JUDAS)</option>
        <option value="sao-jose">SÃO JOSÉ</option>
        <option value="vila-netinho">VILA NETINHO (VIA SANTA CASA)</option>
      </select>
    </div>

    <div class="col-md-3">
      <select class="form-select" id="diaSelect">
        <option value="">Escolha o Dia</option>
        <option value="uteis">Úteis</option>
        <option value="sabado">Sábado</option>
        <option value="domingo">Domingo e Feriados</option>
      </select>
    </div>

    <div class="col-md-2">
      <button class="btn btn-custom w-100" id="btnProcurar">Procurar</button>
    </div>




    <div id="resultado"></div>
  </div>
</div>

 <script src="script.js"></script>
</body>
</html>
