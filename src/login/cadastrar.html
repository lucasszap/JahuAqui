<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Cadrastar-se</title>
    <link rel="stylesheet" href="cadastrar.css">
</head>
<body>

    <div class="wrapper">
        <form action="">
            <h1>Cadastrar-se</h1>
            <div class="input-box">
                <input type="text" name="nomeCompleto" id="nomeCompleto" placeholder="Nome Completo" required>
                <i class="fa-solid fa-user"></i>
            </div>
            <div class="input-box">
                <input type="email" name="email" id="email" placeholder="E-mail" required>
                <i class='fa-solid  fa-envelope'></i> 
            </div>
            <div class="input-box">
                <input type="tel" name="telefone" id="telefone" placeholder="Telefone" required>
                <i class='fa-solid  fa-phone'></i> 
            </div>
            <div class="input-box">
                <input type="password" name="senha" id="senha" placeholder="Senha" required>
                <i class="fa-solid fa-lock"></i>
            </div>
            <div class="input-box">
                <input type="password" name="confirmarSenha" id="confirmarSenha" placeholder="Confirme sua Senha" required>
                <i class="fa-solid fa-lock"></i>
            </div>
            <div class="entrar">
                <p>Já tenho conta. <a href="login.html">Entrar</a></p>
            </div>
            

            <button type="submit" class="btn">Entrar</button>
            
            
        </form>
    </div>
    
</body>
</html>
